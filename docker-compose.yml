services:
  dvwa_target:
    build: 
      context: ./targets/DVWA 
    container_name: honeypot
    restart: always
    ports:
      - "8080:80"
    networks:
      network: 
        ipv4_address: 172.20.0.10
    volumes:
      - ./logs/dvwa:/var/log/apache2

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    networks:
      - network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      network:
        ipv4_address: 172.20.0.11
    depends_on:
      - elasticsearch

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata_ids
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    network_mode: "service:dvwa_target"
    command: -i eth0
    volumes:
      - ./logs/suricata:/var/log/suricata
      - ./sensors/suricata/local.rules:/etc/suricata/local.rules
      - ./sensors/suricata/suricata.yaml:/etc/suricata/suricata.yaml

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.2
    container_name: filebeat
    user: root 
    command: filebeat -e -strict.perms=false
    volumes:
      - ./siem/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs/dvwa:/var/log/dvwa:ro
      - ./logs/suricata:/var/log/suricata:ro
    networks:
      - network
    depends_on:
      - elasticsearch

networks:
  network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24