<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    LogFormat "{ \"timestamp\": \"%{%Y-%m-%dT%H:%M:%S%z}t\", \"client_ip\": \"%a\", \"method\": \"%m\", \"req_url\": \"%U\", \"query_payload\": \"%q\", \"protocol\": \"%H\", \"status_code\": %>s, \"response_bytes\": %B, \"req_user_agent\": \"%{User-Agent}i\" }" json_log
    ErrorLog ${APACHE_LOG_DIR}/error.log
    
    CustomLog ${APACHE_LOG_DIR}/access.log json_log
</VirtualHost>